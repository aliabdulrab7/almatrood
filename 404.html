<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>الصفحة غير موجودة — سليمان المطرود للاستشارات القانونية</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500;600&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="global-enhancements.css">
<style>
:root{--gold:#C9A96E;--gold-light:#E8D5A3;--gold-dark:#9A7A45;--navy:#0A1628;--navy-mid:#122040;--navy-light:#1A2F55;--cream:#F8F4EE;--text-light:#A8B4C8;--font-body:'Tajawal',sans-serif;--font-display:'Amiri',serif;}
[lang="en"]{--font-body:'Montserrat',sans-serif;--font-display:'Playfair Display',serif;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);background:var(--navy);color:var(--cream);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:1.5rem 4rem;display:flex;align-items:center;justify-content:space-between;background:rgba(10,22,40,0.97);backdrop-filter:blur(10px);border-bottom:1px solid rgba(201,169,110,0.2);}
.nav-logo{font-family:var(--font-display);font-size:1.3rem;color:var(--gold);text-decoration:none;display:flex;align-items:center;gap:0.75rem;}
.logo-mark{width:40px;height:40px;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:1rem;position:relative;flex-shrink:0;}
.logo-mark::before{content:'';position:absolute;inset:3px;border:1px solid rgba(201,169,110,0.3);}
.lang-toggle{display:flex;align-items:center;border:1px solid rgba(201,169,110,0.4);overflow:hidden;}
.lang-btn{padding:0.4rem 0.85rem;font-size:0.65rem;font-weight:600;cursor:pointer;background:transparent;border:none;color:var(--text-light);transition:all 0.2s;font-family:var(--font-body);}
.lang-btn.active{background:var(--gold);color:var(--navy);}
.lang-btn:not(.active):hover{color:var(--gold);}

/* 404 HERO */
.error-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:8rem 2rem 4rem;text-align:center;position:relative;overflow:hidden;}
.error-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(201,169,110,0.07) 0%,transparent 65%);}
.error-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,169,110,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,169,110,0.04) 1px,transparent 1px);background-size:60px 60px;}
.error-ornament{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border:1px solid rgba(201,169,110,0.05);border-radius:50%;animation:spin 80s linear infinite;pointer-events:none;}
.error-ornament::before{content:'';position:absolute;inset:50px;border:1px solid rgba(201,169,110,0.04);border-radius:50%;}
@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}

.error-content{position:relative;z-index:1;max-width:620px;}
.error-code{font-family:var(--font-display);font-size:clamp(7rem,18vw,13rem);font-weight:900;line-height:1;margin-bottom:0.5rem;background:linear-gradient(135deg,var(--gold-dark) 0%,var(--gold) 50%,var(--gold-light) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:glow 3s ease-in-out infinite alternate;}
@keyframes glow{from{filter:drop-shadow(0 0 15px rgba(201,169,110,0.15));}to{filter:drop-shadow(0 0 35px rgba(201,169,110,0.45));}}
.error-divider{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 2rem;}
.error-title{font-family:var(--font-display);font-size:clamp(1.4rem,4vw,2.2rem);color:var(--cream);margin-bottom:1.25rem;font-weight:600;}
.error-sub{font-size:clamp(0.85rem,2vw,0.97rem);color:var(--text-light);line-height:1.9;margin-bottom:2.5rem;max-width:480px;margin-left:auto;margin-right:auto;}
.error-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:2rem;}
.btn-gold{background:var(--gold);color:var(--navy);padding:0.85rem 2.2rem;font-family:var(--font-body);font-size:0.88rem;font-weight:700;text-decoration:none;transition:all 0.3s;display:inline-block;}
.btn-gold:hover{background:var(--gold-light);}
.btn-outline{background:transparent;border:1px solid rgba(201,169,110,0.5);color:var(--gold);padding:0.85rem 2.2rem;font-family:var(--font-body);font-size:0.88rem;font-weight:600;text-decoration:none;transition:all 0.3s;display:inline-block;}
.btn-outline:hover{border-color:var(--gold);background:rgba(201,169,110,0.06);}
.redirect-note{font-size:0.72rem;color:var(--text-light);opacity:0.55;letter-spacing:0.03em;}
.redirect-note em{color:var(--gold);font-style:normal;font-weight:600;}

@media(max-width:900px){nav{padding:1.2rem 2rem;}}
@media(max-width:480px){
  .error-actions{flex-direction:column;align-items:stretch;max-width:280px;margin-left:auto;margin-right:auto;}
  .btn-gold,.btn-outline{text-align:center;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">
    <div class="logo-mark" data-ar="س" data-en="S">س</div>
    <span style="font-size:1rem;" data-ar="سليمان المطرود" data-en="AL MATROOD">سليمان المطرود</span>
  </a>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-ar" onclick="setLang('ar')">عربي</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  </div>
</nav>

<!-- 404 CONTENT -->
<div class="error-wrap">
  <div class="error-bg"></div>
  <div class="error-grid"></div>
  <div class="error-ornament"></div>
  <div class="error-content">
    <div class="error-code">404</div>
    <div class="error-divider"></div>
    <h1 class="error-title" data-ar="الصفحة غير موجودة" data-en="Page Not Found">الصفحة غير موجودة</h1>
    <p class="error-sub"
       data-ar="يبدو أن هذه الصفحة غير موجودة أو تم نقلها إلى مكان آخر.<br>لا تقلق — يمكننا مساعدتك في العثور على ما تحتاجه."
       data-en="This page doesn't exist or may have been moved.<br>Don't worry — we can help you find what you need.">
      يبدو أن هذه الصفحة غير موجودة أو تم نقلها إلى مكان آخر.<br>لا تقلق — يمكننا مساعدتك في العثور على ما تحتاجه.
    </p>
    <div class="error-actions">
      <a href="index.html" class="btn-gold" data-ar="العودة للرئيسية" data-en="Back to Home">العودة للرئيسية</a>
      <a href="contact.html" class="btn-outline" data-ar="احجز استشارة" data-en="Book Consultation">احجز استشارة</a>
    </div>
    <p class="redirect-note">
      <span data-ar="سيتم تحويلك تلقائياً خلال " data-en="Redirecting automatically in ">سيتم تحويلك تلقائياً خلال </span><em id="countdown">10</em><span data-ar=" ثوانٍ" data-en=" seconds"> ثوانٍ</span>
    </p>
  </div>
</div>

<script src="global-enhancements.js"></script>
<script>
// ── Language System ──────────────────────────────────────────────
var LANG_KEY = 'almatrood_lang';
function setLang(lang) {
  localStorage.setItem(LANG_KEY, lang);
  applyLang(lang);
}
function applyLang(lang) {
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-ar]').forEach(function(el) {
    var val = el.getAttribute('data-' + lang);
    if (val != null) el.innerHTML = val;
  });
  document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
}
(function() {
  applyLang(localStorage.getItem(LANG_KEY) || 'ar');
})();

// ── Auto-redirect countdown ──────────────────────────────────────
var secs = 10;
var countEl = document.getElementById('countdown');
var timer = setInterval(function() {
  secs--;
  if (countEl) countEl.textContent = secs;
  if (secs <= 0) {
    clearInterval(timer);
    window.location.href = 'index.html';
  }
}, 1000);
</script>
</body>
</html>
